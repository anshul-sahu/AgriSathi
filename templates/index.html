<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri-Tech Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
            padding-top: 60px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 3rem;
            color: #198754;
            font-weight: bold;
        }

        .header p {
            font-size: 1.1rem;
            color: #6c757d;
        }

        .card {
            border-radius: 20px;
            transition: all 0.3s ease;
            border: none;
            min-height: 350px;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #198754, #20c997);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-text {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .btn-custom {
            border-radius: 50px;
            padding: 8px 22px;
        }

        .container {
            max-width: 900px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <h1>🌱 Agri-Tech Advisor</h1>
        <p>Smart tools for crop and fertilizer recommendations</p>
    </div>

    <!-- Cards -->
    <div class="container">
        <div class="row justify-content-center g-4">

            <!-- Fertilizer -->
            <div class="col-md-5">
                <div class="card text-center shadow-sm p-4">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <div class="icon-circle">
                                <i class="bi bi-droplet-fill"></i>
                            </div>
                            <h5 class="card-title">Fertilizer Prediction</h5>
                            <p class="card-text">
                                Get the best fertilizer recommendation based on soil nutrients and weather conditions.
                            </p>
                        </div>
                        <a href="/fertilizer_prediction_page" class="btn btn-success btn-custom mt-3">
                            Go <i class="bi bi-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Crop -->
            <div class="col-md-5">
                <div class="card text-center shadow-sm p-4">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <div class="icon-circle">
                                <i class="bi bi-tree-fill"></i> <!-- ✅ FIXED ICON -->
                            </div>
                            <h5 class="card-title">Crop Recommendation</h5>
                            <p class="card-text">
                                Choose the ideal crop based on soil nutrients and climate conditions.
                            </p>
                        </div>
                        <a href="/crop_recommendation_page" class="btn btn-success btn-custom mt-3">
                            Go <i class="bi bi-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
